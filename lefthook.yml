output:
- success
- failure
pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    goimports:
      glob: "*.go"
      run: goimports -w {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    govet:
      run: just lint
